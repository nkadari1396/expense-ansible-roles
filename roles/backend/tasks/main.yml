  - name: disable node js
    ansible.builtin.command: dnf module disable nodejs -y
        

  - name: enable node js vesrion 20
    ansible.builtin.command: dnf module enable nodejs:20 -y
        

  - name: install node js
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
      loop:
        - nodejs
        - mysql

  - name: create user expense 
    ansible.builtin.user:
      name: expense

  - name: create a app directory
    ansible.builtin.file:
      path: /app
      state: directory
    
  - name: download a url
    ansible.builtin.get_url:
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
      dest: /tmp/backend.zip
      

  - name: extract the backend code
    ansible.builtin.unarchive:
      src: /tmp/backend.zip
      dest: /app
      remote_src: yes

  - name: install dependiecs
    ansible.builtin.command: npm install
    args:
      chdir: /app

  - name: copy backend service #copy only works without variables, template is worked with variables
    ansible.builtin.template:
      src: backend.service.j2
      dest: /etc/systemd/system/backend.service

  - name: ansible to install pymysql
    ansible.builtin.pip:
      name:
      - PyMySQL
      - cryptography
      executable: pip3.9

  - name: import mysql_data
    community.mysql.mysql_db:
      login_user: root
      login_password: "{{ mysql_root_password }}"
      login_host: "{{ login_host }}"
      target: /app/schema/backend.sql
      name: all
      state: import


  - name: Restart service cron on centos, in all cases, also issue daemon-reload to pick up config changes
    ansible.builtin.systemd_service:
      state: restarted
      daemon_reload: true
      name: backend